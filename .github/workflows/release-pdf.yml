name: Release PDF

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Generate presentation PDF
        run: |
          node --input-type=module <<'EOF'
          import puppeteer from 'puppeteer'
          import {pathToFileURL} from 'node:url'
          import path from 'node:path'

          const args = process.env.CI ? ['--no-sandbox'] : undefined
          const browser = await puppeteer.launch({args})
          const page = await browser.newPage()
          const indexPath = path.resolve('index.html')
          const url = pathToFileURL(indexPath).href
          await page.goto(`${url}?print-pdf`, {waitUntil: 'networkidle0'})
          await page.pdf({
            path: 'swxsoc-presentation.pdf',
            printBackground: true,
            preferCSSPageSize: true,
            waitForFonts: true,
          })
          await browser.close()
          EOF

      - name: Upload PDF to release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" swxsoc-presentation.pdf --clobber
